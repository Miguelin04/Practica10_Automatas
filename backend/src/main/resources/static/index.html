<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor de Derivación CFG</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --primary-color: #3b82f6;
            --secondary-color: #1e293b;
            --accent-color: #10b981;
            --error-color: #ef4444;
            --border-color: #334155;
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--secondary-color);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 2rem;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2.5rem;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        textarea {
            width: 100%;
            height: 150px;
            background-color: #0b1120;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            font-family: monospace;
            font-size: 1.1rem;
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            background: linear-gradient(135deg, var(--primary-color), #2563eb);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result-section {
            margin-top: 2rem;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status.success {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--accent-color);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status.error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .derivations-title {
            margin-bottom: 1rem;
            font-size: 1.2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            background-color: #0b1120;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        li {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            font-family: monospace;
        }

        li:last-child {
            border-bottom: none;
        }

        li:hover {
            background-color: rgba(59, 130, 246, 0.1);
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Motor de Derivación CFG</h1>
        
        <div class="input-section">
            <label for="codeInput">Ingresa tu receta (ej. INGREDIENT: 200 GRAMS OF Flour;)</label>
            <textarea id="codeInput" placeholder="INGREDIENT: 200 GRAMS OF Flour;&#10;STEP 1: BOIL Water FOR 10 MINUTES;&#10;STEP 2: ADD Flour;"></textarea>
            <button id="parseBtn" onclick="analyze()">Analizar Gramática</button>
        </div>

        <div class="result-section" id="resultSection">
            <div class="status" id="statusBox">
                <!-- Status icon and text -->
            </div>
            
            <div id="derivationsContainer">
                <div class="derivations-title">Árbol / Pasos de Derivación</div>
                <ul id="derivationsList">
                    <!-- Derivation steps injected here -->
                </ul>
            </div>
        </div>
    </div>

    <script>
        async function analyze() {
            const input = document.getElementById('codeInput').value;
            const resultSection = document.getElementById('resultSection');
            const statusBox = document.getElementById('statusBox');
            const derivationsList = document.getElementById('derivationsList');
            const derivationsContainer = document.getElementById('derivationsContainer');
            const parseBtn = document.getElementById('parseBtn');

            if (!input.trim()) return;

            parseBtn.textContent = "Analizando...";
            parseBtn.disabled = true;

            try {
                const response = await fetch('/api/parse', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ input: input })
                });

                const data = await response.json();
                
                resultSection.style.display = 'block';
                derivationsList.innerHTML = '';

                if (data.success) {
                    statusBox.className = 'status success';
                    statusBox.innerHTML = '✅ Análisis Sintáctico Exitoso';
                    
                    if (data.derivations && data.derivations.length > 0) {
                        derivationsContainer.style.display = 'block';
                        data.derivations.forEach(der => {
                            const li = document.createElement('li');
                            li.textContent = der;
                            derivationsList.appendChild(li);
                        });
                    } else {
                        derivationsContainer.style.display = 'none';
                    }
                } else {
                    statusBox.className = 'status error';
                    statusBox.innerHTML = `❌ Error: ${data.error || 'Hubo un error de sintaxis.'}`;
                    derivationsContainer.style.display = 'none';
                }
            } catch (error) {
                resultSection.style.display = 'block';
                statusBox.className = 'status error';
                statusBox.innerHTML = `❌ Error de red: ${error.message}`;
                derivationsContainer.style.display = 'none';
            } finally {
                parseBtn.textContent = "Analizar Gramática";
                parseBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
